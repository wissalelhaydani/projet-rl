<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recommandation RL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #222; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 24px; }
    .card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    button { background: #1a1a1a; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #333; }
    .projet-card { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .projet-titre { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .projet-desc { font-size: 13px; color: #555; margin-bottom: 12px; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #eee; color: #444; margin-right: 6px; margin-bottom: 8px; }
    .feedback-btns { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btn-like { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-skip { background: #fce4ec; color: #c62828; border: 1px solid #f8bbd0; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-done { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .etat-box { background: #f0f4ff; border: 1px solid #c5cae9; border-radius: 10px; padding: 16px; font-size: 13px; }
    .etat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #e0e0e0; }
    .etat-row:last-child { border-bottom: none; }
    .loading { color: #888; font-size: 13px; }
    .section-title { font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Recommandation de projets — RL</h1>

  <!-- Formulaire profil -->
  <div class="card">
    <p class="section-title">Ton profil</p>
    <label>Nom</label>
    <input type="text" id="nom" value="Youssef" />
    <label>Niveau</label>
    <select id="niveau">
      <option>L1</option><option>L2</option><option>L3</option>
      <option selected>M1</option><option>M2</option>
    </select>
    <label>Domaine préféré</label>
    <select id="domaine">
      <option>IA</option><option>Web</option>
      <option>Data</option><option>Cyber</option>
    </select>
    <label>Compétences (séparées par des virgules)</label>
    <input type="text" id="competences" value="Python, NumPy" />
    <button onclick="recommander()">Obtenir mes recommandations</button>
  </div>

  <!-- Projets recommandés -->
  <div id="projets-section" style="display:none">
    <p class="section-title">Projets recommandés</p>
    <div id="projets-list"></div>
  </div>

  <!-- État RL -->
  <div id="etat-section" style="display:none">
    <div class="card">
      <p class="section-title">Ton profil RL (mis à jour en temps réel)</p>
      <div class="etat-box" id="etat-box"></div>
    </div>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000";

  async function recommander() {
    const nom = document.getElementById("nom").value;
    const niveau = document.getElementById("niveau").value;
    const domaine = document.getElementById("domaine").value;
    const competences = document.getElementById("competences").value
      .split(",").map(c => c.trim());

    document.getElementById("projets-list").innerHTML = '<p class="loading">Génération en cours...</p>';
    document.getElementById("projets-section").style.display = "block";

    const res = await fetch(`${API}/recommander`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nom, niveau, domaine, competences })
    });
    const data = await res.json();

    if (data.erreur) {
      document.getElementById("projets-list").innerHTML = `<p style="color:red">${data.erreur}</p>`;
      return;
    }

    afficherProjets(data.recommandations, nom);
    afficherEtat(nom);
  }

  function afficherProjets(projets, nom) {
    const container = document.getElementById("projets-list");
    container.innerHTML = projets.map((p, i) => `
      <div class="projet-card">
        <div class="projet-titre">${p.titre}</div>
        <div class="projet-desc">${p.description}</div>
        <div>
          ${p.stack.map(s => `<span class="badge">${s}</span>`).join("")}
          <span class="badge" style="background:#fff3e0;color:#e65100">${p.difficulte}</span>
        </div>
        <div style="font-size:12px;color:#777;margin-top:8px">Dataset : ${p.dataset}</div>
        <div class="feedback-btns">
          <button class="btn-like" onclick="envoyerFeedback('${nom}', '${p.titre}', 'like', this)">Like</button>
          <button class="btn-skip" onclick="envoyerFeedback('${nom}', '${p.titre}', 'skip', this)">Skip</button>
          <button class="btn-done" onclick="envoyerFeedback('${nom}', '${p.titre}', 'done', this)">Complété</button>
        </div>
      </div>
    `).join("");
  }

  async function envoyerFeedback(etudiant_id, projet, action, btn) {
    btn.disabled = true;
    btn.textContent = "...";

    const res = await fetch(`${API}/feedback`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ etudiant_id, projet, action })
    });
    const data = await res.json();

    btn.textContent = action === "like" ? "Liké !" : action === "skip" ? "Skippé" : "Complété !";
    afficherEtat(etudiant_id);
  }

  async function afficherEtat(nom) {
    const res = await fetch(`${API}/etat/${nom}`);
    const data = await res.json();

    document.getElementById("etat-section").style.display = "block";
    const box = document.getElementById("etat-box");

    const domaines = Object.entries(data.domaine_interet)
      .map(([k, v]) => `<div class="etat-row"><span>${k}</span><span>${(v*100).toFixed(0)}%</span></div>`)
      .join("");

    box.innerHTML = `
      <div style="margin-bottom:10px;font-weight:500">Intérêt par domaine</div>
      ${domaines}
      <div style="margin-top:12px;color:#555">
        Feedbacks : ${data.total_feedbacks} &nbsp;|&nbsp;
        V(s) : ${data.V.toFixed(2)} &nbsp;|&nbsp;
        Récompense totale : ${data.total_reward.toFixed(1)}
      </div>
    `;
  }
</script>
</body>
</html>
